# Netlify build + SPA-routing configuration.
[build]
  command = "npm run build"
  publish = "dist"

# Belt + braces alongside public/_redirects.
# Sends every unknown URL to index.html so React Router can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets (Vite fingerprints filenames).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
